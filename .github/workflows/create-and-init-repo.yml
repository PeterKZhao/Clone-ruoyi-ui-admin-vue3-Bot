name: Create and init Vue3 UI repo (org, Pages via Actions)

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "要创建的新 GitHub 仓库名（例如: future-ui-admin-vue3）"
        required: true
        default: "future-ui-admin-vue3"
      repo_description:
        description: "仓库描述"
        required: false
        default: "Init from Gitee yudao-ui-admin-vue3"
      private:
        description: "是否创建为私有仓库 (true/false)"
        required: false
        default: "false"
      default_branch:
        description: "新仓库默认分支名（main 或 master）"
        required: false
        default: "master"

      # 方案2：默认启用“若存在则删除重建”，但必须人工确认
      delete_existing:
        description: "若同名仓库已存在，是否删除后重建 (true/false)"
        required: false
        default: "true"
      confirm_delete:
        description: "仅当 delete_existing=true 且 confirm_delete=DELETE 才会删除"
        required: false
        default: ""

      custom_domain:
        description: "Pages 自定义域名（例如：admin.fscitech.net；留空则不绑定）"
        required: false
        default: "admin.fscitech.net"
      enforce_https:
        description: "是否在 Pages 上强制 HTTPS (true/false；若 DNS 未就绪可先 false)"
        required: false
        default: "true"

jobs:
  create-and-init:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ORG: FutureTechQuant
      NEW_REPO: ${{ github.event.inputs.repo_name }}
      REPO_DESC: ${{ github.event.inputs.repo_description }}
      PRIVATE: ${{ github.event.inputs.private }}
      DEFAULT_BRANCH: ${{ github.event.inputs.default_branch }}

      DELETE_EXISTING: ${{ github.event.inputs.delete_existing }}
      CONFIRM_DELETE: ${{ github.event.inputs.confirm_delete }}

      CUSTOM_DOMAIN: ${{ github.event.inputs.custom_domain }}
      ENFORCE_HTTPS: ${{ github.event.inputs.enforce_https }}

    steps:
      - name: Checkout Clone-Bot
        uses: actions/checkout@v4

      - name: Generate GitHub App installation token (org)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Export APP_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          echo "APP_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: pip install -q -r tools/requirements.txt

      - name: Delete existing repo if exists (scheme 2)
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DELETE_EXISTING}" != "true" ]; then
            echo "DELETE_EXISTING=false, skip delete"
            exit 0
          fi

          if [ "${CONFIRM_DELETE}" != "DELETE" ]; then
            echo "ERROR: Refuse to delete. Set confirm_delete=DELETE to proceed."
            exit 1
          fi

          REPO_API="https://api.github.com/repos/${ORG}/${NEW_REPO}"

          CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${REPO_API}")"

          if [ "${CODE}" = "200" ]; then
            echo "Repo exists, deleting: ${ORG}/${NEW_REPO}"
            curl -sS -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${REPO_API}"

            echo "Wait until repo is fully deleted (poll 404)..."
            for i in {1..30}; do
              CODE2="$(curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer ${APP_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${REPO_API}")"
              if [ "${CODE2}" = "404" ]; then
                echo "Repo deletion confirmed (404)."
                break
              fi
              echo "Still exists (HTTP ${CODE2}), sleep 2s... (${i}/30)"
              sleep 2
            done
          else
            echo "Repo not found (HTTP ${CODE}), skip delete"
          fi

      - name: Clone from Gitee
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --depth=1 --single-branch \
            https://gitee.com/yudaocode/yudao-ui-admin-vue3.git source

          rm -rf source/.git source/.gitee source/.github \
                 source/README.md source/README-zh_CN.md

      - name: Replace text content
        shell: bash
        run: |
          set -euo pipefail
          (cd source && python3 ../tools/replace_all.py)

      - name: Copy workflow templates into new repo
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source/.github/workflows

          if [ ! -f "templates/workflows/pages.yml" ]; then
            echo "ERROR: templates/workflows/pages.yml not found"
            exit 1
          fi

          cp -f templates/workflows/pages.yml source/.github/workflows/pages.yml

          sed -i "s/branches: \\\\[ master \\\\]/branches: [ ${DEFAULT_BRANCH} ]/g" source/.github/workflows/pages.yml || true
          sed -i "s/branches: \\\\[ main \\\\]/branches: [ ${DEFAULT_BRANCH} ]/g" source/.github/workflows/pages.yml || true

      - name: Prepare repo content
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p repo_content
          cp -a source/. repo_content/
          rm -rf source

      - name: Create new GitHub repo (org) with retry
        shell: bash
        run: |
          set -euo pipefail

          PRIVATE_BOOL=$( [ "${PRIVATE}" = "true" ] && echo true || echo false )

          create_repo() {
            local resp_file http_code
            resp_file="$(mktemp)"
            http_code="$(curl -sS -o "${resp_file}" -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/orgs/${ORG}/repos" \
              -d "{
                \"name\": \"${NEW_REPO}\",
                \"description\": \"${REPO_DESC}\",
                \"private\": ${PRIVATE_BOOL}
              }")"
            echo "${http_code}"
            if [ "${http_code}" != "201" ]; then
              echo "---- Response body ----"
              cat "${resp_file}"
              echo "-----------------------"
            fi
          }

          for i in {1..5}; do
            CODE="$(create_repo)"
            if [ "${CODE}" = "201" ]; then
              echo "Repo created."
              break
            fi
            echo "Create repo failed (HTTP ${CODE}), retry after 3s... (${i}/5)"
            sleep 3
          done

          if [ "${CODE}" != "201" ]; then
            echo "ERROR: Failed to create repo after retries."
            exit 1
          fi

          sleep 3

      - name: Push to new repo (DEFAULT_BRANCH)
        shell: bash
        run: |
          set -euo pipefail

          git config --global credential.helper store
          echo "https://x-access-token:${APP_TOKEN}@github.com" > ~/.git-credentials

          cd repo_content
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Initial commit: 梦开始的地方"

          git branch -M "${DEFAULT_BRANCH}"
          git remote add origin "https://github.com/${ORG}/${NEW_REPO}.git"
          git push -q -u origin "${DEFAULT_BRANCH}"

          rm -f ~/.git-credentials

      - name: Set repository default branch (recommended)
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -o /dev/null -w "%{http_code}\n" \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}" \
            -d "{\"default_branch\":\"${DEFAULT_BRANCH}\"}" || true

      - name: Enable Pages (build_type=workflow)
        shell: bash
        run: |
          set -euo pipefail

          echo "Enable Pages for ${ORG}/${NEW_REPO} (workflow build)"

          # Create Pages (if not exist)
          RESP1="$(mktemp)"
          CODE1="$(curl -sS -o "${RESP1}" -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}/pages" \
            -d "{
              \"build_type\": \"workflow\",
              \"source\": {\"branch\": \"${DEFAULT_BRANCH}\", \"path\": \"/\"}
            }")"

          if [ "${CODE1}" = "201" ]; then
            echo "Pages created"
          elif [ "${CODE1}" = "409" ]; then
            echo "Pages already exists (409), continue"
          else
            echo "WARN: Create Pages returned HTTP ${CODE1}"
            cat "${RESP1}" || true
          fi

          # Force update Pages (safe)
          RESP2="$(mktemp)"
          CODE2="$(curl -sS -o "${RESP2}" -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}/pages" \
            -d "{
              \"build_type\": \"workflow\",
              \"source\": {\"branch\": \"${DEFAULT_BRANCH}\", \"path\": \"/\"}
            }")"

          if [ "${CODE2}" != "204" ] && [ "${CODE2}" != "200" ]; then
            echo "ERROR: Update Pages failed (HTTP ${CODE2})."
            cat "${RESP2}"
            exit 1
          fi

      - name: Set Pages custom domain + (optional) enforce HTTPS
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CUSTOM_DOMAIN}" ]; then
            echo "CUSTOM_DOMAIN empty, skip custom domain binding"
            exit 0
          fi

          HTTPS_BOOL=$( [ "${ENFORCE_HTTPS}" = "true" ] && echo true || echo false )

          RESP="$(mktemp)"
          CODE="$(curl -sS -o "${RESP}" -w "%{http_code}" \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}/pages" \
            -d "{
              \"cname\": \"${CUSTOM_DOMAIN}\",
              \"https_enforced\": ${HTTPS_BOOL},
              \"build_type\": \"workflow\",
              \"source\": {\"branch\": \"${DEFAULT_BRANCH}\", \"path\": \"/\"}
            }")"

          if [ "${CODE}" != "204" ] && [ "${CODE}" != "200" ]; then
            echo "ERROR: Set Pages cname/https failed (HTTP ${CODE})."
            cat "${RESP}"
            exit 1
          fi

      - name: Print expected URLs
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub Pages (default) URL:"
          echo "https://${ORG,,}.github.io/${NEW_REPO}/"
          echo "Custom domain (if DNS configured):"
          echo "https://${CUSTOM_DOMAIN}/"
